{% extends "layout.html" %}
{% block content %}
<h3 class="mb-3">Mises</h3>

{% for name, amount in mises.items() %}
<div class="card shadow-sm mb-3">
    <div class="card-body d-flex justify-content-between align-items-center">
        <strong>{{ name }}</strong>
        <span class="badge bg-dark">{{ amount }} €</span>
    </div>
</div>
{% endfor %}

<h4 class="mt-4">Ajouter une mise</h4>
<form method="POST" action="/add_mise">
    <div class="mb-3">
        <label class="form-label">Joueur</label>
        <select name="name" class="form-select">
            {% for p in mises.keys() %}
            <option value="{{ p }}">{{ p }}</option>
            {% endfor %}
        </select>
    </div>

    <div class="mb-3">
        <label class="form-label">Montant</label>
        <input type="number" step="0.1" name="amount" class="form-control">
    </div>

    <button class="btn btn-primary w-100">Ajouter</button>
</form>

{% endblock %}
