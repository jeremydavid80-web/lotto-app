<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>{{ title if title else "Lotto App" }}</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/style.css">
</head>

<body class="bg-light">

    <main class="container py-4 mb-5">
        {% block content %}{% endblock %}
    </main>

    <!-- Barre de navigation mobile -->
    <nav class="mobile-nav">
        <a href="/" class="nav-item {% if active=='home' %}active{% endif %}">
            <i class="bi bi-house"></i><span>Accueil</span>
        </a>
        <a href="/tirages" class="nav-item {% if active=='tirages' %}active{% endif %}">
            <i class="bi bi-calendar-check"></i><span>Tirages</span>
        </a>
        <a href="/add_tirage" class="nav-item {% if active=='add' %}active{% endif %}">
            <i class="bi bi-plus-circle"></i><span>Ajouter</span>
        </a>
        <a href="/mises" class="nav-item {% if active=='mises' %}active{% endif %}">
            <i class="bi bi-cash-stack"></i><span>Mises</span>
        </a>
	<a href="/grilles" class="nav-item {% if active=='grilles' %}active{% endif %}">
	    <i class="bi bi-grid"></i><span>Grilles</span>
	</a>
        <a href="/recap" class="nav-item {% if active=='recap' %}active{% endif %}">
            <i class="bi bi-graph-up"></i><span>Récap</span>
        </a>
    </nav>

</body>
</html>
